[mcp_servers.laravel-boost]
command = "php"
args = ["artisan", "boost:mcp"]
cwd = "E:\\web\\craveva-staging"
startup_timeout_sec = 20
tool_timeout_sec = 120
enabled = true

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
cwd = "E:\\web\\craveva-staging"
startup_timeout_sec = 30
tool_timeout_sec = 120
enabled = true
