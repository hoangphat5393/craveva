# =============================================================================
# Pest + MySQL — CHỈ chạy khi bạn bấm "Run workflow" (workflow_dispatch).
# - Không chạy tự động khi push/merge → không ảnh hưởng branch, không deploy.
# - MySQL chỉ tồn tại trong máy ảo GitHub Actions — KHÔNG phải DB Staging/production.
# - Không sửa file deploy-craveva-staging.yml; không SSH tới server.
# =============================================================================

name: Pest (MySQL, manual only)

on:
  workflow_dispatch:

concurrency:
  group: pest-manual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: craveva_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: craveva_test
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, curl, libxml, zip, pcntl, pdo, mysql
          coverage: none
          tools: composer:v2

      - name: Composer install
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: App key (.env)
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Migrate (empty DB trong runner)
        run: php artisan migrate --force

      - name: Pest
        run: ./vendor/bin/pest --no-coverage
