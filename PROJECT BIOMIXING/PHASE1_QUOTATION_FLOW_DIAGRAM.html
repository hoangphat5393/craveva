<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 1 Quotation Flow Diagram</title>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true, theme: "default" });
  </script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .card {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 22px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Phase 1 - Order Intake & Recipe Review</h1>
    <div class="mermaid">
      flowchart TD
      A([Client Request]) --> B[Sales Rep: Create Estimate]

      B --> C[AI Agent: Check Recipe History]
      C --> D{President Review}

      D -- Rejected --> B
      D -- Approved --> E{VP Pricing Review}

      E -- Rejected --> B
      E -- Approved --> F[Convert to Sales Order]
    </div>
  </div>
</body>

</html>
