<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phase 3 - Production & QA</title>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true, theme: "default" });
  </script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
    }

    .card {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }

    h1 {
      margin: 0 0 16px 0;
      font-size: 22px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Phase 3 - Production & QA</h1>
    <div class="mermaid">
      flowchart TD
      A[Task : Print Labels & Batch #] --> B[Task : Ingredient Weighing]
      A --> C[Task : Mixing & Processing]
      B --> C
      C --> D[Task : Packaging]
      D --> E{Quality Check}

      E -- Fail --> C
      E -- Pass --> F[AI Agent : Validate Certs]
      F --> G[Project Completed]
    </div>
  </div>
</body>

</html>
