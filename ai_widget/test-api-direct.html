<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct API Test - Database Query Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        textarea, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 100px; resize: vertical; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #5568d3; transform: translateY(-1px); }
        button:disabled { background: #cbd5e0; cursor: not-allowed; transform: none; }
        .response {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        .response.success { border-left-color: #48bb78; }
        .response.error { border-left-color: #f56565; }
        pre { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔍 Direct API Test</h1>
            <p class="subtitle">Test the chat API directly without the widget</p>
            
            <div class="form-group">
                <label>Message:</label>
                <textarea id="message" placeholder="Enter your message here...">What are your opening hours?</textarea>
            </div>
            
            <div class="form-group">
                <label>API Key:</label>
                <input type="text" id="api-key" value="cvd_viPEIg-8UsVWKmO7hqfu4LZYxee4AoXE" placeholder="Enter API key">
            </div>
            
            <button onclick="testAPI()">Send Message</button>
            
            <div id="response" class="response" style="display: none;"></div>
        </div>
    </div>
    <script>
        const agentId = '69ccc35e7d0ece6ff702487b';
        const apiBase = 'https://ai.craveva.com';
        const chatUrl = 'https://ai.craveva.com/api/v1/agents/69ccc35e7d0ece6ff702487b/chat';
        
        async function testAPI() {
            const message = document.getElementById('message').value;
            const apiKey = document.getElementById('api-key').value;
            const responseDiv = document.getElementById('response');
            
            if (!message) {
                alert('Please enter a message');
                return;
            }
            
            responseDiv.style.display = 'block';
            responseDiv.className = 'response';
            responseDiv.innerHTML = '<p>⏳ Sending request...</p>';
            
            try {
                const response = await fetch(chatUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(apiKey ? { 'Authorization': `Bearer ${apiKey}` } : {})
                    },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    responseDiv.className = 'response success';
                    responseDiv.innerHTML = `
                        <h3>✅ Success</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    responseDiv.className = 'response error';
                    responseDiv.innerHTML = `
                        <h3>❌ Error (${response.status})</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                responseDiv.className = 'response error';
                responseDiv.innerHTML = `
                    <h3>❌ Network Error</h3>
                    <p>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
